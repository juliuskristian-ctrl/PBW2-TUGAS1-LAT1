<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Statistik Produk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="card shadow mt-4">
    <div class="card-header bg-dark text-white"><h2>Statistik Inventori</h2></div>
    <div class="card-body">
        <ul class="list-group mb-4">
            <li class="list-group-item">Total Produk: <b th:text="${stats.totalProducts}">0</b></li>
            <li class="list-group-item">Rata-rata Harga: <b th:text="'Rp ' + ${#numbers.formatDecimal(stats.avgPrice, 0, 'POINT', 0, 'POINT')}">0</b></li>
            <li class="list-group-item text-danger">Stok Menipis (< 20): <b th:text="${stats.lowStockCount}">0</b></li>
        </ul>

        <h4>Perbandingan Harga</h4>
        <p>Termahal: <span th:text="${stats.expensive.name + ' (Rp ' + stats.expensive.price + ')'}"></span></p>
        <p>Termurah: <span th:text="${stats.cheapest.name + ' (Rp ' + stats.cheapest.price + ')'}"></span></p>

        <h4 class="mt-4">Summary Per Kategori</h4>
        <table class="table table-bordered">
            <tr th:each="entry : ${stats.categorySummary}">
                <td th:text="${entry.key}">Kategori</td>
                <td th:text="${entry.value} + ' Produk'">0</td>
            </tr>
        </table>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
