<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>About - Spring MVC Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 th:text="${appName}">App Name</h1>
    <hr>
    <p><strong>Version:</strong> <span th:text="${version}">1.0</span></p>
    <p><strong>Author:</strong> <span th:text="${author}">Nama</span></p>

    <h3>Technologies Used:</h3>
    <ul class="list-group w-50">
        <li class="list-group-item" th:each="tech : ${technologies}" th:text="${tech}">Tech</li>
    </ul>

    <div class="mt-4">
        <a th:href="@{/products}" class="btn btn-secondary">Back to Products</a>
    </div>
</div>
</body>
</html>
