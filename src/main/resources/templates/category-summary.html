<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Category Summary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
        <h2 class="mb-0">Product Categories</h2>
    </div>
    <div class="card-body">
        <ul class="list-group">
            <li th:each="cat : ${categories}"
                class="list-group-item d-flex justify-content-between align-items-center">

                <a th:href="@{/products/category/{name}(name=${cat})}"
                   th:text="${cat}"
                   class="text-decoration-none fw-bold">Category Name</a>

                <span class="badge bg-secondary rounded-pill"
                      th:text="${allProducts.stream().filter(p -> p.category == cat).count()}">
                        0
                    </span>
            </li>
        </ul>

        <div class="mt-4">
            <a th:href="@{/products}" class="btn btn-outline-primary">Back to Product List</a>
        </div>
    </div>
</div>

</body>
</html>
